<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing... — Vibe Audit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                    mono: ['JetBrains Mono', 'monospace'],
                },
            }
        }
    }
    </script>
    <style>
        body { background: #06080f; }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen text-gray-100 font-sans flex flex-col">
    <div class="w-full px-3 py-2" style="background:linear-gradient(90deg,#0d9488,#065f46);font-family:sans-serif;"><div class="max-w-3xl mx-auto"><div class="text-center mb-1"><a href="https://dexscreener.com/pulsechain/0x32b9d861802eaeb90b141daa618074a9a38dcae6" class="text-sm font-medium tracking-wide" style="color:#d1fae5;text-decoration:none;"><span class="opacity-75">Powered by</span> <span class="font-bold">Green Wick</span> <span class="opacity-75">Cryptocurrency</span></a></div><div class="flex items-center justify-center gap-3"><a href="https://wick.pics" class="flex items-center gap-1.5 px-3 py-1 rounded-lg text-xs font-semibold whitespace-nowrap" style="background:rgba(255,255,255,0.12);color:#d1fae5;text-decoration:none;">&larr; Back to WICK Agent Hub</a><a href="https://greenwick.tiiny.site/#join" target="_blank" rel="noopener" class="flex items-center gap-1.5 px-3 py-1 rounded-lg text-xs font-bold whitespace-nowrap" style="background:rgba(255,255,255,0.18);color:#ecfdf5;text-decoration:none;">Buy $WICK &rarr;</a></div></div></div>
    <div class="flex-1 flex items-center justify-center"><div class="max-w-md mx-auto px-6 text-center">
        <div class="spinner mx-auto mb-8"></div>
        <h1 class="text-2xl font-bold text-white mb-2">Running your Vibe Check</h1>
        <p class="text-sm text-gray-500 font-mono mb-1" id="repo-url">{{ repo_url }}</p>
        <p class="text-base text-indigo-300 mt-4 mb-6" id="status-text">Cloning repository...</p>

        <div class="w-full bg-white/5 rounded-full h-1.5 mb-8">
            <div id="progress" class="progress-bar bg-indigo-500 h-1.5 rounded-full" style="width: 5%"></div>
        </div>

        <p class="text-xs text-gray-600">This usually takes 30–90 seconds depending on repo size.</p>

        <div id="error-box" class="hidden mt-8 p-4 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300 text-sm"></div>
    </div>

    <script>
    const JOB_ID = "{{ job_id }}";
    const steps = [
        {at: 0, text: "Cloning repository...", pct: 10},
        {at: 5000, text: "Scanning file structure...", pct: 25},
        {at: 10000, text: "Checking for secrets & dependencies...", pct: 40},
        {at: 20000, text: "Running AI architecture review...", pct: 60},
        {at: 40000, text: "AI is reading your code...", pct: 75},
        {at: 60000, text: "Almost there...", pct: 85},
    ];

    const statusEl = document.getElementById('status-text');
    const progressEl = document.getElementById('progress');
    const errorBox = document.getElementById('error-box');
    const start = Date.now();

    // Animate progress steps
    steps.forEach(s => {
        setTimeout(() => {
            statusEl.textContent = s.text;
            progressEl.style.width = s.pct + '%';
        }, s.at);
    });

    // Poll for completion
    const poll = setInterval(async () => {
        try {
            const res = await fetch('/status/' + JOB_ID);
            if (!res.ok) return;
            const data = await res.json();

            if (data.status === 'done') {
                clearInterval(poll);
                progressEl.style.width = '100%';
                statusEl.textContent = 'Done! Loading your report...';
                setTimeout(() => {
                    window.location.href = '/report/' + data.audit_id;
                }, 500);
            } else if (data.status === 'error') {
                clearInterval(poll);
                progressEl.style.width = '100%';
                progressEl.classList.remove('bg-indigo-500');
                progressEl.classList.add('bg-red-500');
                errorBox.classList.remove('hidden');
                errorBox.textContent = data.error || 'Something went wrong. Please try again.';
                statusEl.textContent = 'Audit failed';
            }
        } catch (e) {
            // Network error, keep polling
        }
    }, 3000);
    </script>
</body>
</html>
